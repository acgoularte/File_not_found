<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador e Video</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="page">
        <section id="countdownPanel" class="countdown-panel" aria-live="polite">
            <p class="label">Contagem regressiva</p>
            <h1 id="countdown" class="countdown">10</h1>
            <p id="status" class="status">Preparando...</p>
        </section>

        <section id="renderWrapper" class="render-wrapper is-hidden" aria-hidden="true">
            <iframe id="pageFrame" class="page-frame" src="about:blank" title="Renderizacao de arquivo"></iframe>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
